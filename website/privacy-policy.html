        :root {
            --green-primary: #4CAF50;
            --green-dark: #388E3C;

            --bg: #ffffff;
            --bg-alt: #f5f5f5;
            --text: #212121;
            --text-secondary: #616161;
            --card-bg: #ffffff;
            --border: #e0e0e0;
            --header-bg: rgba(255,255,255,0.95);
            --radius: 12px;
            --max-width: 800px;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --bg-alt: #1e1e1e;
            --text: #e0e0e0;
            --text-secondary: #aaaaaa;
            --card-bg: #1e1e1e;
            --border: #333333;
            --header-bg: rgba(18,18,18,0.95);
            --green-bg: #1b2e1c;
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg: #121212;
                --bg-alt: #1e1e1e;
                --text: #e0e0e0;
                --text-secondary: #aaaaaa;
                --card-bg: #1e1e1e;
                --border: #333333;
                --header-bg: rgba(18,18,18,0.95);
                --green-bg: #1b2e1c;
            }
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: 64px;
        }

        .header-inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .header-logo img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: background 0.2s;
        }

        .theme-toggle:hover {
            background: var(--bg-alt);
        }

        .lang-select {
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            outline: none;
        }

        .lang-select:focus {
            border-color: var(--green-primary);
        }

        .main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 100px 24px 60px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--green-primary);
        }

        .page-app {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .privacy-content h3 {
            font-size: 1.2rem;
            margin: 32px 0 12px;
            color: var(--text);
        }

        .privacy-content h3:first-child {
            margin-top: 0;
        }

        .privacy-content p {
            margin-bottom: 16px;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .privacy-content ul {
            margin: 0 0 16px 24px;
            color: var(--text-secondary);
        }

        .privacy-content li {
            margin-bottom: 6px;
        }

        .privacy-content a {
            color: var(--green-primary);
        }

        .privacy-updated {
            font-style: italic;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 24px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 40px;
            color: var(--green-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 10px 20px;
            border: 1px solid var(--green-primary);
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .back-link:hover {
            background: var(--green-primary);
            color: #ffffff;
        }

        .footer {
            text-align: center;
            padding: 32px 24px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .main { padding: 88px 20px 40px; }
            .page-title { font-size: 1.5rem; }
        }
    </style>
</head>

        }
        document.documentElement.lang = lang;
        localStorage.setItem('1goshop-lang', lang);
    }

    function getSystemTheme() {
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('1goshop-theme', theme);
        var btn = document.getElementById('themeToggle');
        if (btn) btn.textContent = theme === 'dark' ? '\u2600' : '\u263E';
    }

    (function() {
        var savedTheme = localStorage.getItem('1goshop-theme');
        if (savedTheme) {
            setTheme(savedTheme);
        } else {
            setTheme(getSystemTheme());
        }

        var savedLang = localStorage.getItem('1goshop-lang') || 'sk';
        var select = document.getElementById('langSelect');
        if (select) {
            select.value = savedLang;
            select.addEventListener('change', function() {
                setLanguage(this.value);
            });
        }
        setLanguage(savedLang);

        var themeBtn = document.getElementById('themeToggle');
        if (themeBtn) {
            themeBtn.addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme') || getSystemTheme();
                setTheme(current === 'dark' ? 'light' : 'dark');
            });
        }
    })();
    </script>
</body>
</html>
